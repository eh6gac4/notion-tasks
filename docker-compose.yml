services:
  dev:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - pkg_cache:/cache
    environment:
      - NEXTAUTH_SECRET
      - NEXTAUTH_URL
      - APP_USERNAME
      - APP_PASSWORD
      - NOTION_TOKEN
      - NOTION_DATABASE_ID

volumes:
  node_modules:
  pkg_cache:
